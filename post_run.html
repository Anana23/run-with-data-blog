<section class="inner">

		</header>
	</section>

	<!-- Form -->
<section class="inner workout-content">
 	<!-- Form -->
	<form id="input-form">

<table class="rating-table">
  <thead>
    <tr>
      <th></th>
      <th>No</th>
      <th>Low</th>
      <th>Medium</th>
      <th>High</th>
    </tr>
  </thead>

  <tbody>

    <!-- Motivation -->
    <tr>
      <td>Intensity</td>
      <td><input type="radio" id="motivation_0" name="motivation" value="0"><label for="motivation_0" class="choice-box"></label></td>
      <td><input type="radio" id="motivation_1" name="motivation" value="1"><label for="motivation_1" class="choice-box"></label></td>
      <td><input type="radio" id="motivation_2" name="motivation" value="2"><label for="motivation_2" class="choice-box"></label></td>
      <td><input type="radio" id="motivation_3" name="motivation" value="3"><label for="motivation_3" class="choice-box"></label></td>
    </tr>

    <!-- Hip Pain -->
    <tr>
      <td>Hip Pain</td>
      <td><input type="radio" id="hip_pain_0" name="hip_pain" value="0"><label for="hip_pain_0" class="choice-box"></label></td>
      <td><input type="radio" id="hip_pain_1" name="hip_pain" value="1"><label for="hip_pain_1" class="choice-box"></label></td>
      <td><input type="radio" id="hip_pain_2" name="hip_pain" value="2"><label for="hip_pain_2" class="choice-box"></label></td>
      <td><input type="radio" id="hip_pain_3" name="hip_pain" value="3"><label for="hip_pain_3" class="choice-box"></label></td>
    </tr>

    <!-- Knee Pain -->
    <tr>
      <td>Knee Pain</td>
      <td><input type="radio" id="knee_pain_0" name="knee_pain" value="0"><label for="knee_pain_0" class="choice-box"></label></td>
      <td><input type="radio" id="knee_pain_1" name="knee_pain" value="1"><label for="knee_pain_1" class="choice-box"></label></td>
      <td><input type="radio" id="knee_pain_2" name="knee_pain" value="2"><label for="knee_pain_2" class="choice-box"></label></td>
      <td><input type="radio" id="knee_pain_3" name="knee_pain" value="3"><label for="knee_pain_3" class="choice-box"></label></td>
    </tr>

  </tbody>
</table>



		<!-- Digestive issues -->
		<p>Digestive problems (select all that apply):</p>

		<input type="checkbox" id="no" name="digestive_issues[]" value="no">
		<label for="no">No</label><br>

		<input type="checkbox" id="diarrhea" name="digestive_issues[]" value="diarrhea">
		<label for="diarrhea">Diarrhea</label><br>

   		<input type="checkbox" id="bloated" name="digestive_issues[]" value="bloated">
		<label for="bloated">Bloated</label><br>

		<input type="checkbox" id="pain" name="digestive_issues[]" value="pain">
		<label for="pain">Pain</label><br>

		<input type="checkbox" id="cramps" name="digestive_issues[]" value="cramps">
		<label for="cramps">Cramps</label><br>

		<input type="checkbox" id="stomach_issues" name="digestive_issues[]" value="stomach_issues">
		<label for="stomach_issues">Stomach issues</label><br>

		<input type="checkbox" id="enforced_stop" name="digestive_issues[]" value="enforced_stop">
		<label for="enforced_stop">Enforced stop</label><br>

    <br>


<div class="form-group">
    <label>Run type:</label>

    <div class="run-type-options">
        <label>
            <input type="radio" name="run_type" value="short" required>
            Short (< 6 km)

            Intermediate (6 - 15 km)

        <label>
            <input type="radio" name="run_type" value="long">

        <label>

            Intervals
        </label>
    </div>
</div>

  <br>
    		<label for="run_intensity">Run pace:</label>
		<select id="run_intensity" name="run_intensity" required>
			<option value="">Select intensity</option>
      <option value="low">Low</option>
      <option value="intermediate">Intermediate</option>
			<option value="high">High</option>
		</select>

		<br><br>
		<button type="submit">Submit</button>

  </form>
</section>

	<!-- Logout -->

<!-- Scripts -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const supabase = createClient(
	'https://lsnwqvvhecpltfygjuhw.supabase.co',
	'sb_publishable_KH9p68D3_PevlnQJdYn_wg_T4SoN8bW'
);

// Redirect if not logged in
supabase.auth.onAuthStateChange((event, session) => {
	if (event === 'SIGNED_OUT' || !session) {
		window.location.href = "login.html";
	}
});

document.getElementById('input-form').addEventListener('submit', async (e) => {
	e.preventDefault();
	const form = e.target;
	const status = document.getElementById('status-message');

	const { data: { user } } = await supabase.auth.getUser();
	if (!user) {
		status.textContent = "User not logged in";
		status.style.color = "red";
		return;
	}

	const issues = Array.from(
		form.querySelectorAll('input[name="digestive_issues[]"]:checked')
	).map(cb => cb.value);

	const data = {
		user_id: user.id,
		intensity: parseInt(form.motivation).value,
		hip_pain: parseInt(form.hip_pain.value),
		knee_pain: parseInt(form.knee_pain.value),
		digestive_issues: issues,
    	run_type: form.run_type.value,
    	run_intensity: form.run_intensity.value
	};

	const { error } = await supabase.from('post_run_data').insert([data]);

	if (error) {
		status.textContent = "Error: " + error.message;
		status.style.color = "red";
	} else {
		status.textContent = "Input saved!";
		status.style.color = "green";
		form.reset();
	}
});

// Logout
document.getElementById('logout-button').addEventListener('click', async () => {
	await supabase.auth.signOut();
	window.location.href = 'login.html';
});

// Show live values for all sliders
document.querySelectorAll('.slider-row').forEach(row => {
  const slider = row.querySelector('input[type="range"]');
  const valueEl = row.querySelector('.slider-value');

  const unit = slider.max === "100" ? "%" : ""; // % only for 0-100 sliders

  const update = () => {
    valueEl.textContent = slider.value + unit;
  };

  update();
  slider.addEventListener('input', update);
});

</script>

</body>
</html>
