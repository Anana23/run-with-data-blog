<section class="inner">

                <!-- Motivation -->
<div class="slider-row">
  <label for="motivation">Motivation (1 - 5)</label>
  <div class="slider-value-row">
    <span class="slider-value">3</span>
    <input type="range" id="motivation" name="motivation" min="1" max="5" step="1" value="3">

</div>


<div class="slider-row">
  <label for="hip_pain">Hip Pain (0 - 3)</label>

    <input type="range" id="hip_pain" name="hip_pain" min="0" max="3" step="1" value="0">
  </div>
</div>


<div class="slider-row">
  <label for="knee_pain">Knee Pain (0 - 3)</label>
  <div class="slider-value-row">

</div>

                <!-- Workout type -->
                <p>Workout type (select all that apply):</p>

            <script type="module">
            import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

            const supabase = createClient(
            'https://lsnwqvvhecpltfygjuhw.supabase.co',
            'sb_publishable_KH9p68D3_PevlnQJdYn_wg_T4SoN8bW'
            );

            // Redirect if not logged in
            supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_OUT' || !session) {
                window.location.href = "login.html";
            }
            });

            // Form submission
            document.getElementById('input-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const status = document.getElementById('status-message');

            // Get the logged-in user
            const { data: { user }, error: userError } = await supabase.auth.getUser();
            if (userError || !user) {
                status.textContent = "User not logged in";
                status.style.color = "red";
                return;
            }


            // Get all checked workout types
            const workouts = Array.from(
                form.querySelectorAll('input[name="workout_type[]"]:checked')
            ).map(cb => cb.value);


            // Prepare data
            const data = {
                user_id: user.id,
                motivation: parseInt(form.motivation.value),
                hip_pain: parseInt(form.hip_pain.value),
                knee_pain: parseInt(form.knee_pain.value),
                workout_type: workouts
            };

            // Insert into Supabase
            const { error } = await supabase.from('workout_data').insert([data]);
            if (error) {
                status.textContent = "Error: " + error.message;
                status.style.color = "red";
            } else {
                status.textContent = "Input saved!";
                status.style.color = "green";
                form.reset();
            }
            });

            // Logout
            document.getElementById('logout-button').addEventListener('click', async () => {
            const { error } = await supabase.auth.signOut();
            if (error) {
                alert("Logout failed: " + error.message);
            } else {
                window.location.href = 'login.html';
            }
            });

// Show live values for all sliders
document.querySelectorAll('.slider-row').forEach(row => {
  const slider = row.querySelector('input[type="range"]');
  const valueEl = row.querySelector('.slider-value');

  const unit = slider.max === "100" ? "%" : ""; // % only for 0-100 sliders

  const update = () => {
    valueEl.textContent = slider.value + unit;
  };

  update();
  slider.addEventListener('input', update);
});

            </script>
